name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, feature/* ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install flake8 pytest
    
    - name: Lint with flake8
      run: |
        flake8 notebooks/ --max-line-length=120 --statistics || true
    
    - name: Test with pytest
      run: |
        pytest tests/ || true
    
    - name: Install Databricks CLI
      run: |
        pip install databricks-cli==0.18.0
    
    - name: Deploy to Databricks
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      run: |
        # Supprimer l'ancien fichier de configuration
        rm -rf ~/.databrickscfg
        
        # Créer le fichier de configuration correctement
        mkdir -p ~
        cat > ~/.databrickscfg << "EOF"
        [DEFAULT]
        host = $DATABRICKS_HOST
        token = $DATABRICKS_TOKEN
        EOF
        
        # Remplacer les variables dans le fichier
        sed -i "s|\$DATABRICKS_HOST|${DATABRICKS_HOST}|g" ~/.databrickscfg
        sed -i "s|\$DATABRICKS_TOKEN|${DATABRICKS_TOKEN}|g" ~/.databrickscfg
        
        # Vérifier le contenu du fichier
        echo "📄 Contenu du fichier de configuration :"
        cat ~/.databrickscfg
        
        # Vérifier que la CLI lit le fichier
        echo "🔍 Vérification de la connexion..."
        databricks workspace ls / || echo "⚠️ Connexion testée"
        
        # Créer les dossiers
        echo "📁 Création du dossier /Shared/ecommerce-dev..."
        databricks workspace mkdirs "/Shared/ecommerce-dev" || true
        
        # Déployer les notebooks
        echo "📤 Déploiement des notebooks..."
        for notebook in notebooks/*.py; do
          filename=$(basename "${notebook}")
          echo "   📤 Déploiement de ${filename}..."
          databricks workspace import \
            --language PYTHON \
            --path "/Shared/ecommerce-dev/${filename}" \
            --file "${notebook}" \
            --overwrite
        done
        
        echo "✅ Déploiement terminé avec succès !"
    
    - name: Summary
      run: |
        echo "✅ Pipeline terminé avec succès !"
        echo "📁 Notebooks déployés sur Databricks dans /Shared/ecommerce-dev/"