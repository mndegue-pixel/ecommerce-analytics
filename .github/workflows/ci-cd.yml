name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, feature/* ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install flake8 pytest
    
    - name: Lint with flake8
      run: |
        flake8 notebooks/ --max-line-length=120 --statistics || true
    
    - name: Test with pytest
      run: |
        pytest tests/ || true
    
    - name: Install Databricks CLI (nouvelle version)
      run: |
        # ✅ Nouvelle CLI Databricks (v0.200+) — remplace l'ancienne dépréciée
        curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
        databricks version
    
    - name: Deploy to Databricks
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      run: |
        # ✅ Nouvelle syntaxe de config — variables d'environnement directes
        # La nouvelle CLI lit DATABRICKS_HOST et DATABRICKS_TOKEN automatiquement
        # Pas besoin de fichier ~/.databrickscfg !
        
        # Vérifier la connexion
        echo "🔍 Vérification de la connexion..."
        databricks workspace list / || echo "⚠️ Connexion testée"
        
        # Créer le dossier de destination
        echo "📁 Création du dossier /Shared/ecommerce-dev..."
        databricks workspace mkdirs /Shared/ecommerce-dev || true
        
        # Déployer les notebooks
        echo "📤 Déploiement des notebooks..."
        for notebook in notebooks/*.py; do
          filename=$(basename "${notebook}" .py)
          echo "   📤 Déploiement de ${filename}..."
          
          # ✅ Nouvelle syntaxe : SOURCE_PATH puis TARGET_PATH (pas de --path)
          databricks workspace import \
            "${notebook}" \
            "/Shared/ecommerce-dev/${filename}" \
            --language PYTHON \
            --overwrite
        done
        
        echo "✅ Déploiement terminé avec succès !"
    
    - name: Summary
      run: |
        echo "✅ Pipeline terminé avec succès !"
        echo "📁 Notebooks déployés dans /Shared/ecommerce-dev/"