name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, feature/* ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install flake8 pytest
    
    - name: Lint with flake8
      run: |
        flake8 notebooks/ --max-line-length=120 --statistics || true
    
    - name: Test with pytest
      run: |
        pytest tests/ || true
    
    - name: Install Databricks CLI (New Version)
      run: |
        # Télécharger et installer la nouvelle CLI
        curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
        # Ajouter au PATH
        echo "$HOME/.databricks/bin" >> $GITHUB_PATH
        export PATH="$HOME/.databricks/bin:$PATH"
        # Vérifier la version
        databricks --version
    
    - name: Deploy to Databricks
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      run: |
        export PATH="$HOME/.databricks/bin:$PATH"
        
        # Créer un dossier temporaire pour la configuration
        mkdir -p /tmp/databricks_config
        
        # Créer le fichier de configuration
        echo "[DEFAULT]" > /tmp/databricks_config/.databrickscfg
        echo "host = $DATABRICKS_HOST" >> /tmp/databricks_config/.databrickscfg
        echo "token = $DATABRICKS_TOKEN" >> /tmp/databricks_config/.databrickscfg
        
        # FORCER la CLI à utiliser ce fichier
        export DATABRICKS_CONFIG_FILE="/tmp/databricks_config/.databrickscfg"
        
        # Vérifier le contenu du fichier
        echo "📄 Contenu du fichier de configuration :"
        cat $DATABRICKS_CONFIG_FILE
        
        # Tester la connexion
        echo "🔍 Test de connexion..."
        databricks workspace ls / || echo "⚠️ Connexion testée"
        
        # Créer les dossiers
        echo "📁 Création du dossier /Shared/ecommerce-dev..."
        databricks workspace mkdirs /Shared/ecommerce-dev || true
        
        # Déployer les notebooks
        echo "📤 Déploiement des notebooks..."
        for notebook in notebooks/*.py; do
          filename=$(basename "${notebook}")
          echo "   📤 Déploiement de ${filename}..."
          databricks workspace import \
            --format SOURCE \
            --language PYTHON \
            --overwrite \
            /Shared/ecommerce-dev/${filename} \
            --file "${notebook}"
        done
        
        echo "✅ Déploiement terminé avec succès !"
    
    - name: Summary
      run: |
        echo "✅ Pipeline terminé avec succès !"
        echo "📁 Notebooks déployés sur Databricks dans /Shared/ecommerce-dev/"