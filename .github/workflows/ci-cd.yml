- name: Deploy to Databricks
env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
run: |
  # Créer un dossier temporaire pour la configuration
  mkdir -p /tmp/databricks_config
  cd /tmp/databricks_config
  
  # Écrire le fichier de configuration
  cat > .databrickscfg << 'EOF'
[DEFAULT]
host = $DATABRICKS_HOST
token = $DATABRICKS_TOKEN
EOF
  
  # Remplacer les variables dans le fichier
  sed -i "s/\$DATABRICKS_HOST/${DATABRICKS_HOST}/g" .databrickscfg
  sed -i "s/\$DATABRICKS_TOKEN/${DATABRICKS_TOKEN}/g" .databrickscfg
  
  # Utiliser ce fichier de configuration
  export DATABRICKS_CONFIG_FILE="/tmp/databricks_config/.databrickscfg"
  
  # Vérifier le contenu
  cat $DATABRICKS_CONFIG_FILE
  
  # Revenir au dossier du projet
  cd -
  
  # Tester la connexion
  databricks workspace ls "/" || echo "⚠️ Connexion testée"
  
  # Créer les dossiers
  databricks workspace mkdirs "/Shared/ecommerce-dev" || true
  
  # Déployer les notebooks
  for notebook in notebooks/*.py; do
    filename=$(basename "${notebook}")
    echo "📤 Déploiement de ${filename}..."
    databricks workspace import \
      --language PYTHON \
      --path "/Shared/ecommerce-dev/${filename}" \
      --file "${notebook}" \
      --overwrite
  done
  
  echo "✅ Déploiement terminé !"